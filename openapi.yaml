        uri: { type: string, format: uri }
        verified: { type: boolean }
        updated_at: { type: [string, "null"] }
    CallbackRequest:
      type: object
      required: [callback]
      properties:
        callback:
          type: object
          required: [event, uri]
          properties:
            event: { type: string }
            uri: { type: string, format: uri }
    CallbackMutationRequest:
      type: object
      description: >-
        Overloaded PUT body. Exactly one shape is sent depending on the SDK
        method invoked.
      required: [callback]
      properties:
        callback:
          oneOf:
            - type: object
              properties:
                event: { type: string }
                uri: { type: string, format: uri }
            - type: object
              required: [verifier]
              properties:
                verifier: { type: string }
            - type: object
              required: [resend]
              properties:
                resend: { type: boolean, enum: [true] }
    CallbackResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              type: object
              properties:
                callback: { $ref: "#/components/schemas/Callback" }
