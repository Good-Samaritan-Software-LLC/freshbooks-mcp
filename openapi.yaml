openapi: 3.1.0
info:
  title: FreshBooks REST API (SSOT for the FreshBooks MCP)
  version: "2026-06-02"
  description: >-
    Single source of truth for the FreshBooks HTTP API surface wrapped by the
    Good Samaritan Software FreshBooks MCP server.

    Authority precedence used to build this document (resolved field-by-field):

    1. **FreshBooks Node SDK** `@freshbooks/api` v4.1.0 — authoritative for which
       fields exist, their types, required/optional, enums, request/response
       shape, and list query conventions. Field *types*, *enums*, and *wrappers*
       below come from the SDK's TypeScript models and transform functions.
    2. **Partial OpenAPI YAML** (`FreshBooks-API.yml`, OpenAPI 3.0.1) — used only
       where the SDK is structurally silent: HTTP paths/verbs/status codes and the
       `estimates`/`taxes` resources the SDK does not model.
    3. The MCP server is the subject under audit and is **not** a source of truth.

    Field names in this spec are the **HTTP wire names** (snake_case, as the
    FreshBooks API actually sends/receives them), derived from the SDK transform
    functions (e.g. `transformInvoiceRequest`). The SDK exposes camelCase
    ergonomic names (e.g. `createDate` ⇄ wire `create_date`); the MCP passes
    camelCase to the SDK, which performs the wire mapping.

    Anything not confirmed by either the SDK or the partial YAML is flagged with
    `x-unverified: true` and a note describing what is missing — it is documented
    but must not be trusted as correct.
  contact:
    name: Good Samaritan Software
    url: https://freshbooks.goodsamsoftware.com/
  license:
    name: MIT

servers:
  - url: https://api.freshbooks.com
    description: FreshBooks API (all sub-APIs share this host)

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Authenticated user / identity
  - name: invoices
    description: Accounting API — customer invoices
  - name: clients
    description: Accounting API — clients (customers)
  - name: expenses
    description: Accounting API — expenses
  - name: expense_categories
    description: Accounting API — expense categories (read-only)
  - name: payments
    description: Accounting API — invoice payments
  - name: items
    description: Accounting API — reusable line items
  - name: credit_notes
    description: Accounting API — credit notes
  - name: other_income
    description: Accounting API — non-invoice income
  - name: journal_entries
    description: Accounting API — journal entries & chart of accounts
  - name: bills
    description: Accounting API — vendor bills
  - name: bill_payments
    description: Accounting API — payments against vendor bills
  - name: bill_vendors
    description: Accounting API — vendors / suppliers
  - name: taxes
    description: Accounting API — taxes (from partial YAML; not in SDK)
  - name: estimates
    description: Accounting API — estimates (from partial YAML; not in SDK)
  - name: tasks
    description: Accounting API — tasks
  - name: reports
    description: Accounting API — financial reports (read-only)
  - name: projects
    description: Projects API — projects
  - name: services
    description: Comments API — services & service rates
  - name: time_entries
    description: Time-tracking API — time entries
  - name: timers
    description: Comments API — timer control (MCP extra; not modelled by SDK)
  - name: callbacks
    description: Events API — webhook callbacks
  - name: payment_options
    description: Online-payments API — payment options

paths:
  # ----------------------------------------------------------------------------
  # AUTH / IDENTITY
  # ----------------------------------------------------------------------------
  /auth/api/v1/users/me:
    get:
      tags: [auth]
      operationId: getIdentity
      summary: Get the authenticated user (identity)
      description: >-
        Returns the current user including `business_memberships`, used to
        discover the `account_id` (accounting) and `business_id` (projects/time)
        required by every other operation. Response is wrapped as
        `response.result.user`.
      responses:
        "200":
          description: The authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    properties:
                      result:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ----------------------------------------------------------------------------
  # INVOICES (Accounting API)
  # ----------------------------------------------------------------------------
  /accounting/account/{accountId}/invoices/invoices:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      tags: [invoices]
      operationId: listInvoices
      summary: List invoices
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/AccountingSort"
        - $ref: "#/components/parameters/AccountingSearch"
        - $ref: "#/components/parameters/Include"
      responses:
        "200":
          description: A page of invoices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [invoices]
      operationId: createInvoice
      summary: Create an invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceRequest"
      responses:
        "200":
          description: The created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "422": { $ref: "#/components/responses/ValidationError" }

  /accounting/account/{accountId}/invoices/invoices/{invoiceId}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - $ref: "#/components/parameters/InvoiceId"
    get:
      tags: [invoices]
      operationId: getInvoice
      summary: Get a single invoice
      parameters:
        - $ref: "#/components/parameters/Include"
      responses:
        "200":
          description: The invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [invoices]
      operationId: updateInvoice
      summary: Update an invoice (also used for soft-delete)
      description: >-
        Updates an invoice. The SDK's `invoices.delete` is implemented as a
        `PUT` that sets `vis_state` (soft delete); there is no HTTP `DELETE`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceRequest"
      responses:
        "200":
          description: The updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "404": { $ref: "#/components/responses/NotFound" }

  /accounting/account/{accountId}/invoices/invoices/{invoiceId}/share_link:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - $ref: "#/components/parameters/InvoiceId"
    get:
      tags: [invoices]
      operationId: getInvoiceShareLink
      summary: Get an invoice client share link
      parameters:
        - name: share_method
          in: query
          required: true
          schema:
            type: string
            enum: [share_link]
          description: SDK always sends `share_method=share_link`.
      responses:
        "200":
          description: The share link
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    properties:
                      result:
                        type: object
                        properties:
                          share_link:
                            $ref: "#/components/schemas/ShareLink"

  # ----------------------------------------------------------------------------
  # CLIENTS (Accounting API)
  # ----------------------------------------------------------------------------
  /accounting/account/{accountId}/users/clients:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      tags: [clients]
      operationId: listClients
      summary: List clients
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/AccountingSort"
        - $ref: "#/components/parameters/AccountingSearch"
        - $ref: "#/components/parameters/Include"
      responses:
        "200":
          description: A page of clients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientListResponse"
    post:
      tags: [clients]
      operationId: createClient
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientRequest"
      responses:
        "200":
          description: The created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"

  /accounting/account/{accountId}/users/clients/{clientId}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - $ref: "#/components/parameters/ClientId"
    get:
      tags: [clients]
      operationId: getClient
      summary: Get a single client
      responses:
        "200":
          description: The client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [clients]
      operationId: updateClient
      summary: Update a client (also used for soft-delete via vis_state)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientRequest"
      responses:
        "200":
          description: The updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"

  # ----------------------------------------------------------------------------
  # EXPENSES (Accounting API)
  # ----------------------------------------------------------------------------
  /accounting/account/{accountId}/expenses/expenses:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      tags: [expenses]
      operationId: listExpenses
      summary: List expenses
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/AccountingSort"
        - $ref: "#/components/parameters/AccountingSearch"
        - $ref: "#/components/parameters/Include"
      responses:
        "200":
          description: A page of expenses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseListResponse"
    post:
      tags: [expenses]
      operationId: createExpense
      summary: Create an expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseRequest"
      responses:
        "200":
          description: The created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"

  /accounting/account/{accountId}/expenses/expenses/{expenseId}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - $ref: "#/components/parameters/ExpenseId"
    get:
      tags: [expenses]
      operationId: getExpense
      summary: Get a single expense
      responses:
        "200":
          description: The expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [expenses]
      operationId: updateExpense
      summary: Update an expense (also used for soft-delete via vis_state)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseRequest"
      responses:
        "200":
          description: The updated expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"

  # ----------------------------------------------------------------------------
  # EXPENSE CATEGORIES (Accounting API, read-only)
  # ----------------------------------------------------------------------------
  /accounting/account/{accountId}/expenses/categories:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      tags: [expense_categories]
      operationId: listExpenseCategories
      summary: List expense categories
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: A page of expense categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseCategoryListResponse"

  /accounting/account/{accountId}/expenses/categories/{categoryId}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - name: categoryId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [expense_categories]
      operationId: getExpenseCategory
      summary: Get a single expense category
      responses:
        "200":
          description: The expense category
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    properties:
                      result:
                        type: object
                        properties:
                          category:
                            $ref: "#/components/schemas/ExpenseCategory"

  # ----------------------------------------------------------------------------
  # PAYMENTS (Accounting API)
  # ----------------------------------------------------------------------------
  /accounting/account/{accountId}/payments/payments:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      tags: [payments]
      operationId: listPayments
      summary: List payments
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/AccountingSearch"
      responses:
        "200":
          description: A page of payments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentListResponse"
    post:
      tags: [payments]
      operationId: createPayment
      summary: Record a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRequest"
      responses:
        "200":
          description: The recorded payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"

  /accounting/account/{accountId}/payments/payments/{paymentId}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - name: paymentId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [payments]
      operationId: getPayment
      summary: Get a single payment
      responses:
        "200":
          description: The payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [payments]
      operationId: updatePayment
      summary: Update a payment (also used for soft-delete via vis_state)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRequest"
      responses:
        "200":
          description: The updated payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"

  # ----------------------------------------------------------------------------
  # ITEMS (Accounting API) — no delete
  # ----------------------------------------------------------------------------
  /accounting/account/{accountId}/items/items:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      tags: [items]
      operationId: listItems
      summary: List items
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/AccountingSort"
      responses:
        "200":
          description: A page of items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemListResponse"
    post:
      tags: [items]
      operationId: createItem
      summary: Create an item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemRequest"
      responses:
        "200":
          description: The created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"

  /accounting/account/{accountId}/items/items/{itemId}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - name: itemId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [items]
      operationId: getItem
      summary: Get a single item
      responses:
        "200":
          description: The item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
    put:
      tags: [items]
      operationId: updateItem
      summary: Update an item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemRequest"
      responses:
        "200":
          description: The updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"

  # ----------------------------------------------------------------------------
  # CREDIT NOTES (Accounting API)
  # ----------------------------------------------------------------------------
  /accounting/account/{accountId}/credit_notes/credit_notes:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      tags: [credit_notes]
      operationId: listCreditNotes
      summary: List credit notes
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/AccountingSort"
        - $ref: "#/components/parameters/AccountingSearch"
      responses:
        "200":
          description: A page of credit notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditNoteListResponse"
    post:
      tags: [credit_notes]
      operationId: createCreditNote
      summary: Create a credit note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditNoteRequest"
      responses:
        "200":
          description: The created credit note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditNoteResponse"

  /accounting/account/{accountId}/credit_notes/credit_notes/{creditId}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - name: creditId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [credit_notes]
      operationId: getCreditNote
      summary: Get a single credit note
      description: >-
        NOTE: the SDK reads the single-resource response from the **plural**
        `response.result.credit_notes` key (not `credit_note`).
      responses:
        "200":
          description: The credit note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditNoteResponse"
    put:
      tags: [credit_notes]
      operationId: updateCreditNote
      summary: Update a credit note (also used for soft-delete via vis_state)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditNoteRequest"
      responses:
        "200":
          description: The updated credit note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditNoteResponse"

  # ----------------------------------------------------------------------------
  # OTHER INCOME (Accounting API) — real DELETE
  # ----------------------------------------------------------------------------
  /accounting/account/{accountId}/other_incomes/other_incomes:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      tags: [other_income]
      operationId: listOtherIncome
      summary: List other income
      description: >-
        NOTE: the list response wraps the array under the **singular**
        `response.result.other_income` key.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/AccountingSort"
        - $ref: "#/components/parameters/AccountingSearch"
      responses:
        "200":
          description: A page of other income entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtherIncomeListResponse"
    post:
      tags: [other_income]
      operationId: createOtherIncome
      summary: Record other income
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtherIncomeRequest"
      responses:
        "200":
          description: The recorded income
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtherIncomeResponse"

  /accounting/account/{accountId}/other_incomes/other_incomes/{otherIncomeId}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - name: otherIncomeId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [other_income]
      operationId: getOtherIncome
      summary: Get a single other-income entry
      responses:
        "200":
          description: The income entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtherIncomeResponse"
    put:
      tags: [other_income]
      operationId: updateOtherIncome
      summary: Update an other-income entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtherIncomeRequest"
      responses:
        "200":
          description: The updated income entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtherIncomeResponse"
    delete:
      tags: [other_income]
      operationId: deleteOtherIncome
      summary: Delete an other-income entry (hard DELETE)
      responses:
        "200": { description: Deleted }

  # ----------------------------------------------------------------------------
  # JOURNAL ENTRIES (Accounting API) — create only
  # ----------------------------------------------------------------------------
  /accounting/account/{accountId}/journal_entries/journal_entries:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    post:
      tags: [journal_entries]
      operationId: createJournalEntry
      summary: Create a journal entry
      description: >-
        Double-entry: total debits must equal total credits across `details`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryRequest"
      responses:
        "200":
          description: The created journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntryResponse"

  /accounting/account/{accountId}/journal_entry_accounts/journal_entry_accounts:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      tags: [journal_entries]
      operationId: listJournalEntryAccounts
      summary: List journal-entry accounts (chart of accounts, read-only)
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/AccountingSort"
      responses:
        "200":
          description: A page of accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntryAccountListResponse"

  # ----------------------------------------------------------------------------
  # BILLS (Accounting API)
  # ----------------------------------------------------------------------------
  /accounting/account/{accountId}/bills/bills:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      tags: [bills]
      operationId: listBills
      summary: List bills
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/AccountingSearch"
      responses:
        "200":
          description: A page of bills
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillListResponse"
    post:
      tags: [bills]
      operationId: createBill
      summary: Create a bill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillRequest"
      responses:
        "200":
          description: The created bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillResponse"

  /accounting/account/{accountId}/bills/bills/{billId}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - name: billId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [bills]
      operationId: getBill
      summary: Get a single bill
      responses:
        "200":
          description: The bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillResponse"
    put:
      tags: [bills]
      operationId: updateBill
      summary: Update a bill (used by SDK for both soft-delete and archive)
      description: >-
        The SDK exposes both `bills.delete` and `bills.archive` as a `PUT` to
        this path differing only by the `vis_state` value sent (delete vs
        archive). There is no separate HTTP path or verb for archive.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillRequest"
      responses:
        "200":
          description: The updated bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillResponse"

  # ----------------------------------------------------------------------------
  # BILL PAYMENTS (Accounting API)
  # ----------------------------------------------------------------------------
  /accounting/account/{accountId}/bill_payments/bill_payments:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      tags: [bill_payments]
      operationId: listBillPayments
      summary: List bill payments
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/AccountingSearch"
      responses:
        "200":
          description: A page of bill payments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillPaymentListResponse"
    post:
      tags: [bill_payments]
      operationId: createBillPayment
