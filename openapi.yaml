              schema:
                $ref: "#/components/schemas/CallbackResponse"
    put:
      tags: [callbacks]
      operationId: updateCallback
      summary: Update / verify / resend a callback
      description: >-
        A single `PUT` is overloaded by the SDK. `callbacks.update` sends
        `{ callback: { uri, event } }`; `callbacks.verify` sends
        `{ callback: { verifier } }`; `callbacks.resendVerification` sends
