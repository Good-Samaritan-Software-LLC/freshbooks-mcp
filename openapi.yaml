                    $ref: "#/components/schemas/PaymentOptions"
    post:
      tags: [payment_options]
      operationId: createPaymentOptions
      summary: Configure payment options for an invoice
      description: "Request body is a flat object (NOT wrapped in a `payment_options` key)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentOptionsRequest"
