    post:
      tags: [callbacks]
      operationId: createCallback
      summary: Register a webhook callback
      description: "Create sends only `event` and `uri`."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallbackRequest"
      responses:
        "200":
          description: The created callback
