      scheme: bearer
      bearerFormat: JWT
      description: >-
        OAuth2 bearer access token. The API also requires `Api-Version: alpha`
        and `Content-Type: application/json` headers (set by the SDK).

  # --------------------------------------------------------------------------
  # REUSABLE PARAMETERS
  # --------------------------------------------------------------------------
  parameters:
    AccountId:
      name: accountId
      in: path
      required: true
      description: Accounting account id (string, e.g. "ABC123"). From `user.business_memberships[].business.account_id`.
      schema: { type: string }
    BusinessId:
      name: businessId
      in: path
      required: true
      description: Business id (integer-as-string). From `user.business_memberships[].business.id`.
      schema: { type: string }
    InvoiceId:
      name: invoiceId
      in: path
      required: true
      schema: { type: string }
    ClientId:
      name: clientId
      in: path
      required: true
      schema: { type: string }
    ExpenseId:
      name: expenseId
      in: path
      required: true
      schema: { type: string }
    Page:
      name: page
      in: query
      required: false
      description: 1-based page number (PaginationQueryBuilder → `page`).
      schema: { type: integer, minimum: 1, default: 1 }
    PerPage:
      name: per_page
      in: query
      required: false
      description: Items per page (PaginationQueryBuilder → `per_page`).
      schema: { type: integer, minimum: 1, maximum: 100, default: 30 }
    Include:
      name: include[]
      in: query
      required: false
      description: >-
        Related resources to embed (IncludesQueryBuilder → repeated `include[]`).
        e.g. `include[]=lines&include[]=presentation` for invoices.
      style: form
      explode: true
      schema:
        type: array
        items: { type: string }
    AccountingSort:
      name: sort
      in: query
      required: false
      description: >-
        Accounting/Events sort (SortQueryBuilder, accounting family):
        `sort=<key>_asc` or `sort=<key>_desc`. e.g. `invoice_date_desc`.

        Per-resource sort keys (live-verified 2026-06-03 unless noted):
          - clients [live]: `organization_name`, `fullname`, `email`, `updated`
            WORK; `organization`, `fname`, `lname` are silently IGNORED. The MCP
            maps its public `organization` -> `organization_name` and
            `fname`/`lname` -> `fullname` (report F19). `outstanding`/`credit`
            [doc] could not be live-differentiated (fixtures share $0 balances).
          - invoices [live]: the only honored date sort key is `invoice_date`
            (the MCP maps its public `create_date` to it — F13; see
            tests/integration/filters.live.test.ts).
          - items, bill_vendors, credit_notes, other_income, tasks,
            journal_entry_accounts: the MCP does NOT expose sortBy for these (an
            earlier note here claiming otherwise was stale); their API sort keys
            remain unprobed and unused.
      schema: { type: string }
    AccountingSearch:
      name: search
      in: query
      required: false
      description: >-
        Accounting/Events search filters (SearchQueryBuilder, accounting family),
        not a single param. Encodings: equals → `search[<key>]=<v>`; like →
        `search[<key>]=<v>`; between → `search[<key>_min]=<v>&search[<key>_max]=<v>`;
        in → repeated `search[<key>][]=<v>`. Date values are coerced to
        `YYYY-MM-DD`.

        AUTHORITY: the SDK's SearchQueryBuilder accepts ANY key, so key names are
        NOT SDK-established. The keys below marked [doc] are the AUTHORITATIVE
        keys from the official FreshBooks API reference
        (https://www.freshbooks.com/api/parameters and per-resource pages); keys
        marked [x-unverified] are taken from MCP usage and not yet doc-checked.

        Authoritative per-resource filter keys:
          - invoices [live]: `date_min`/`date_max` (date range), `updated_min`/
            `updated_max`, `customerid`/`customerids`, `v3_status` (string),
            booleans `paid` / `outstanding`, `invoiceid`/`invoiceids`,
            `invoice_number`. LIVE-VERIFIED: `v3_status` works but `statusid` does
            NOT; the MCP's `create_date`/`status`/`payment_status` keys are all
            silently ignored — report F3/F4/F5.
          - expenses [doc]: `date_min`/`date_max`, `updated_min`/`updated_max`,
            `clientid`/`clientids`, `projectid`/`projectids`,
            `categoryid`/`categoryids`, `amount_min`/`amount_max`, `vendor`,
            `has_receipt`. (No status filter exists — MCP `status` is a no-op,
            report F6.)
          - payments [doc]: `date_min`/`date_max`, `updated_min`/`updated_max`,
            `invoiceid`, `clientid`/`clientids`, `customerid`/`customerids`,
            `amount_min`/`amount_max`, `type`, `currency`.
          - bills [doc]: `vendorid` (Equals), `statuses` (In-list),
            `currency_code`, `ids` (In-list). NO date-range filter exists.
            (The MCP's `vendor_id`, `status`, `issue_date` keys are WRONG —
            report F1/F7/F8.)
          - clients [doc]: contains-filters use the `_like` suffix —
            `fname_like`, `lname_like`, `organization_like`, `email_like`,
            `address_like`, `note_like`, `phone_like`, `user_like`; exact:
            `email`, `username`, `userid`/`userids`, `vis_state`; ranges
            `updated_min`/`updated_max`; booleans `has_credit`/`has_draft`/
            `has_outstanding`/`has_overdue`. (The MCP's base-key `like('fname'/
            'lname'/'organization')` may not match the `_like` keys — report F9.)
          - other_income [doc]: `incomeid`, `category_name`, `vis_state` ONLY.
            (The MCP's `source` and date filters are not documented — report
            F10/F11.)
          - credit_notes [live]: `clientid` (correct, verified) and `date` for
            the date range. The MCP's `create_date` date filter is a silent
            no-op — report F15. `client_id` (underscore) is also ignored.
          - bill_vendors [live]: no working server-side filter found —
            `vendor_name`, `vendor_name_like`, and `email` are all silently
            ignored (report F16).
          - bill_payments [live]: NO working server-side filter — `bill_id`,
            `billid`, AND `paid_date` are all silently ignored (full set returned
            regardless), report F17. SEPARATE BUG (fixed under #64): billpayment_list
            read the SDK key `bill_payments`, but the list transform returns
            `billPayments`, so the tool ALWAYS returned an empty list.
          - journal_entry_accounts [live]: NO working server-side filter —
            `search[account_type]` AND a bare `account_type` param are both
            silently ignored (full chart returned), report F20. The MCP no longer
            sends it; filter client-side (the chart is small/single-page).
      schema: { type: object, additionalProperties: true }
    ProjectSort:
      name: sort
      in: query
      required: false
      description: >-
        Projects sort (live-verified 2026-06-03): ascending is `sort=<key>`,
        descending is `sort=-<key>`.

        CAVEAT: the SDK's SortQueryBuilder emits accounting-style `sort=key_asc`
        for this family (APIClient passes no resourceType, and its project branch
        drops the direction), which the Projects API silently ignores — the MCP
        emits the correct bare/minus param itself (report F19).

        Per-resource sort keys:
          - projects [live]: `title`, `due_date`, and `created_at` all WORK with
            the bare/minus format.
          - time_entries [live]: NO working server-side sort — every key/format is
            ignored; results are newest-first. The MCP accepts sortBy for
            compatibility but does not send it.
      schema: { type: string }
    ProjectSearch:
      name: search
      in: query
      required: false
      description: >-
        Projects/TimeEntry filters (SearchQueryBuilder, ProjectResource family).
        Filter keys live-verified under #64 (see per-resource notes below).

        `equals`/`in` are emitted as bare `<key>=<value>` (no `search[...]`
        wrapper); `like`/`between` still use `search[...]`.

        Per-resource filter keys:
          - time_entries [live]: `client_id`, `billable`, `billed`, `started_from`/
            `started_to`, `updated_since`, `identity_id`, `team`,
            `include_deleted`, `include_unlogged` are documented. LIVE-VERIFIED:
            `project_id` DOES filter server-side (narrows) despite not being in the
            published doc set — so the F12 concern is cleared for `project_id`.
            `task_id`/`service_id`/`active` were not individually seeded but use the
            same bare-key family. (Date filters emit TOP-LEVEL `started_from=`/
            `started_to=` via a custom builder, not `search[...]`.)
          - projects [live]: `client_id`, `complete` (and `active`/`internal`,
            boolean family) filter server-side and NARROW — MCP is correct.
            `title` (like) is NOT supported server-side — silently ignored, returns
            the full set (report F18); left unsent by the tool.
      schema: { type: object, additionalProperties: true }

  # --------------------------------------------------------------------------
  # REUSABLE RESPONSES
  # --------------------------------------------------------------------------
  responses:
    Unauthorized:
      description: Missing/invalid/expired bearer token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    ValidationError:
      description: Validation error (HTTP 422 / accounting errno)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  # --------------------------------------------------------------------------
  # SHARED SCHEMAS
  # --------------------------------------------------------------------------
  schemas:
    Money:
      type: object
      description: >-
        Money is an object with **string** decimal `amount` and a 3-letter
        currency `code` (SDK `Money`). It is NOT a bare number.
      properties:
        amount:
          type: string
          examples: ["100.00"]
        code:
          type: string
          examples: ["USD"]

    VisState:
      type: integer
      description: >-
        Visibility/soft-delete flag. For most resources (SDK `VisState`):
        0 = active, 1 = deleted. `other_income` additionally uses 2 = archived.
      enum: [0, 1, 2]

    AccountingPagination:
      type: object
      description: Pagination fields present alongside the array in `response.result` (accounting/events APIs).
      properties:
        page: { type: integer }
        pages: { type: integer }
        per_page: { type: integer }
        total: { type: integer }

    ProjectMeta:
      type: object
      description: Pagination object on projects/time-tracking list responses (top-level `meta`).
      properties:
        page: { type: integer }
        pages: { type: integer }
        per_page: { type: integer }
        total: { type: integer }

    ErrorResponse:
      type: object
      description: >-
        FreshBooks HTTP error envelope (SDK `ErrorResponse`). Accounting errors
        use `{ errors: [...] }`; auth/other sub-APIs may instead return
        `{ message }`. (The MCP re-normalizes these to a JSON-RPC 2.0 error with a
        nested `freshbooksError` — see `docs/api/errors.md` — but that is the MCP
        envelope, not the API's HTTP body.)
      oneOf:
        - type: object
          required: [errors]
          properties:
            errors:
              type: array
              items: { $ref: "#/components/schemas/ApiError" }
        - type: object
          required: [message]
          properties:
            message: { type: string }

    ApiError:
      type: object
      required: [message]
      properties:
        message: { type: string }
        errorCode: { type: integer, description: FreshBooks numeric error code (errno) }
        field: { type: string }
        object: { type: string }
        value: { type: string }

    Line:
      type: object
      description: Invoice/credit-note line item (SDK `Line`). Wire fields are snake_case.
      properties:
        lineid: { type: string }
        invoiceid: { type: string }
        name: { type: string }
        description: { type: string }
        qty: { type: number }
        unit_cost: { $ref: "#/components/schemas/Money" }
        amount: { $ref: "#/components/schemas/Money" }
        type:
          type: integer
          description: "LineType: 0 = normal, 1 = billing."
          enum: [0, 1]
        taxName1: { type: [string, "null"] }
        taxAmount1: { type: [number, "null"] }
        taxName2: { type: [string, "null"] }
        taxAmount2: { type: [number, "null"] }
        compounded_tax: { type: boolean }

    # ----- USER -----
    User:
      type: object
      properties:
        id: { type: integer }
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string }
        business_memberships:
          type: array
          items: { $ref: "#/components/schemas/BusinessMembership" }
      required: [id, email]

    BusinessMembership:
      type: object
      properties:
        id: { type: integer }
        role: { type: string }
        business:
          type: object
          properties:
            id: { type: integer, description: business_id (projects/time APIs) }
            name: { type: string }
            account_id: { type: string, description: account_id (accounting API) }

    # ----- INVOICE -----
    Invoice:
      type: object
      description: Invoice read model (SDK `Invoice`). IDs are integers; money fields are Money objects.
      properties:
        id: { type: integer }
        invoiceid: { type: integer }
        accountid: { type: string }
        accounting_systemid: { type: string }
        customerid: { type: integer }
        invoice_number: { type: string }
        create_date: { type: string, format: date, description: "YYYY-MM-DD" }
        due_date: { type: string, format: date }
        created_at: { type: string, description: "YYYY-MM-DD hh:mm:ss (UTC)" }
        updated: { type: [string, "null"] }
        currency_code: { type: string }
        language: { type: string }
        amount: { $ref: "#/components/schemas/Money" }
        outstanding: { $ref: "#/components/schemas/Money" }
        paid: { $ref: "#/components/schemas/Money" }
        discount_total: { $ref: "#/components/schemas/Money" }
        discount_value: { type: string }
        deposit_amount: { $ref: "#/components/schemas/Money" }
        notes: { type: string }
        terms: { type: [string, "null"] }
        po_number: { type: [string, "null"] }
        status: { $ref: "#/components/schemas/InvoiceStatus" }
        payment_status: { $ref: "#/components/schemas/PaymentStatus" }
        display_status: { $ref: "#/components/schemas/DisplayStatus" }
        v3_status: { $ref: "#/components/schemas/InvoiceV3Status" }
        deposit_status: { $ref: "#/components/schemas/DepositStatus" }
        autobill_status: { $ref: "#/components/schemas/AutoBillStatus" }
        lines:
          type: array
          items: { $ref: "#/components/schemas/Line" }
        vis_state: { $ref: "#/components/schemas/VisState" }
    InvoiceWrite:
      type: object
      description: Writable invoice fields (subset accepted by create/update).
      required: [customerid, create_date]
      properties:
        customerid: { type: integer }
        create_date: { type: string, format: date }
        due_date: { type: string, format: date }
        currency_code: { type: string }
        language: { type: string }
        notes: { type: string }
        terms: { type: string }
        po_number: { type: string }
        discount_value: { type: string }
        status:
          type: integer
          enum: [0, 1, 2, 3]
          description: >-
            LIVE-VERIFIED on update (2026-06-03): only 0 (disputed), 1 (draft),
            2 (sent), 3 (viewed) are settable; 4–8 are payment-driven and 422
            with "Status must be one of 'draft', 'sent', 'viewed' or
            'disputed'." Strings 422 ("must be a number"). `action_mark_as_sent:
            true` is the documented alternative for draft→sent (also verified
            working). Create-with-status not probed.
        action_mark_as_sent:
          type: boolean
          description: "Mark the invoice as sent (live-verified alternative to `status: 2`)."
        lines:
          type: array
          items: { $ref: "#/components/schemas/Line" }
        vis_state: { $ref: "#/components/schemas/VisState" }
    InvoiceStatus:
      type: integer
      description: >-
        LIVE-VERIFIED (2026-06-03): the wire `status` is NUMERIC on read AND
        write — 0 disputed, 1 draft, 2 sent, 3 viewed, 4 paid, 5 auto-paid,
        6 retry, 7 failed, 8 partial (doc-confirmed table; 0–3 live-verified).
        The SDK's `InvoiceStatus` STRING enum (disputed/draft/sent/viewed/
        paid/auto-paid/retry/failed/partial, hyphenated `auto-paid`) does NOT
        match the wire: writing a string 422s with errno 1015 "The field
        'status' must be a number."
      enum: [0, 1, 2, 3, 4, 5, 6, 7, 8]
    PaymentStatus:
      type: string
      enum: [unpaid, partial, paid, auto-paid]
    DisplayStatus:
      type: string
      enum: [draft, created, sent, viewed, outstanding]
    InvoiceV3Status:
      type: string
      enum: [created, draft, sent, viewed, failed, retry, success, autopaid, paid, partial, disputed, resolved, overdue, declined, pending, deposit-partial, deposit-paid]
    DepositStatus:
      type: string
      enum: [paid, unpaid, partial, none, converted]
    AutoBillStatus:
      type: [string, "null"]
      enum: [retry, failed, success, "null"]
    InvoiceRequest:
      type: object
      required: [invoice]
      properties:
        invoice: { $ref: "#/components/schemas/InvoiceWrite" }
    InvoiceResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              type: object
              properties:
                invoice: { $ref: "#/components/schemas/Invoice" }
    InvoiceListResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              allOf:
                - $ref: "#/components/schemas/AccountingPagination"
                - type: object
                  properties:
                    invoices:
                      type: array
                      items: { $ref: "#/components/schemas/Invoice" }

    # ----- CLIENT -----
    Client:
      type: object
      description: Client read model (SDK `Client`). `id` is an integer.
      properties:
        id: { type: integer }
        fname: { type: [string, "null"] }
        lname: { type: [string, "null"] }
        organization: { type: [string, "null"] }
        email: { type: [string, "null"] }
        bus_phone: { type: string }
        mob_phone: { type: string }
        home_phone: { type: [string, "null"] }
        fax: { type: string }
        p_street: { type: string }
        p_street2: { type: string }
        p_city: { type: string }
        p_province: { type: string }
        p_code: { type: string }
        p_country: { type: string }
        s_street: { type: string }
        s_street2: { type: string }
        s_city: { type: string }
        s_province: { type: string }
        s_code: { type: string }
        s_country: { type: string }
        currency_code: { type: string }
        language: { type: [string, "null"] }
        vat_number: { type: [string, "null"] }
        vat_name: { type: [string, "null"] }
        note: { type: [string, "null"] }
        allow_late_fees: { type: boolean }
        allow_late_notifications: { type: boolean }
        accounting_systemid: { type: string }
        updated: { type: [string, "null"] }
        signup_date: { type: [string, "null"] }
        vis_state: { $ref: "#/components/schemas/VisState" }
    ClientRequest:
      type: object
      required: [client]
      properties:
        client:
          type: object
          description: Writable client fields (all optional).
          properties:
            fname: { type: string }
            lname: { type: string }
            organization: { type: string }
            email: { type: string }
            bus_phone: { type: string }
            home_phone: { type: string }
            mob_phone: { type: string }
            fax: { type: string }
            p_street: { type: string }
            p_street2: { type: string }
            p_city: { type: string }
            p_province: { type: string }
            p_code: { type: string }
            p_country: { type: string }
            s_street: { type: string }
            s_street2: { type: string }
            s_city: { type: string }
            s_province: { type: string }
            s_code: { type: string }
            s_country: { type: string }
            currency_code: { type: string }
            language: { type: string }
            vat_number: { type: string }
            vat_name: { type: string }
            note: { type: string }
            allow_late_fees: { type: boolean }
            allow_late_notifications: { type: boolean }
            vis_state: { $ref: "#/components/schemas/VisState" }
    ClientResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              type: object
              properties:
                client: { $ref: "#/components/schemas/Client" }
    ClientListResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              allOf:
                - $ref: "#/components/schemas/AccountingPagination"
                - type: object
                  properties:
                    clients:
                      type: array
                      items: { $ref: "#/components/schemas/Client" }

    # ----- EXPENSE -----
    Expense:
      type: object
      description: Expense read model (SDK `Expense`). `amount` is Money; tax amounts are Money.
      properties:
        id: { type: integer }
        expenseid: { type: integer }
        categoryid: { type: integer }
        staffid: { type: integer }
        clientid: { type: integer }
        projectid: { type: integer }
        invoiceid: { type: [integer, "null"] }
        amount: { $ref: "#/components/schemas/Money" }
        date: { type: string, format: date }
        vendor: { type: [string, "null"] }
        notes: { type: string }
        markup_percent: { type: number }
        taxName1: { type: [string, "null"] }
        taxName2: { type: [string, "null"] }
        taxPercent1: { type: [string, "null"] }
        taxPercent2: { type: [string, "null"] }
        taxAmount1: { $ref: "#/components/schemas/Money" }
        taxAmount2: { $ref: "#/components/schemas/Money" }
        compounded_tax: { type: boolean }
        has_receipt: { type: boolean }
        status: { $ref: "#/components/schemas/ExpenseStatus" }
        accounting_systemid: { type: string }
        updated: { type: string }
        vis_state: { $ref: "#/components/schemas/VisState" }
    ExpenseStatus:
      type: integer
      description: "SDK `ExpenseStatus`: 0 internal, 1 outstanding, 2 invoiced, 3 recouped."
      enum: [0, 1, 2, 3]
    ExpenseWrite:
      type: object
      required: [categoryid, staffid, amount, date]
      properties:
        categoryid: { type: integer }
        staffid: { type: integer }
        amount: { $ref: "#/components/schemas/Money" }
        date: { type: string, format: date }
        clientid: { type: integer }
        projectid: { type: integer }
        vendor: { type: string }
        notes: { type: string }
        markup_percent: { type: number }
        taxName1: { type: string }
        taxName2: { type: string }
        taxAmount1: { $ref: "#/components/schemas/Money" }
        taxAmount2: { $ref: "#/components/schemas/Money" }
        vis_state: { $ref: "#/components/schemas/VisState" }
    ExpenseRequest:
      type: object
      required: [expense]
      properties:
        expense: { $ref: "#/components/schemas/ExpenseWrite" }
    ExpenseResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              type: object
              properties:
                expense: { $ref: "#/components/schemas/Expense" }
    ExpenseListResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              allOf:
                - $ref: "#/components/schemas/AccountingPagination"
                - type: object
                  properties:
                    expenses:
                      type: array
                      items: { $ref: "#/components/schemas/Expense" }

    # ----- EXPENSE CATEGORY -----
    ExpenseCategory:
      type: object
      properties:
        id: { type: integer }
        categoryid: { type: integer }
        category: { type: string }
        is_cogs: { type: boolean }
        is_editable: { type: boolean }
        parentid: { type: integer }
        created_at: { type: string }
        updated_at: { type: string }
        vis_state: { $ref: "#/components/schemas/VisState" }
    ExpenseCategoryListResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              allOf:
                - $ref: "#/components/schemas/AccountingPagination"
                - type: object
                  properties:
                    categories:
                      type: array
                      items: { $ref: "#/components/schemas/ExpenseCategory" }

    # ----- PAYMENT -----
    Payment:
      type: object
      description: Payment read model (SDK `Payment`). IDs (`id`, `invoiceid`, `clientid`) are **strings**.
      properties:
        id: { type: string }
        invoiceid: { type: string }
        clientid: { type: string }
        amount: { $ref: "#/components/schemas/Money" }
        date: { type: string, format: date }
        type: { $ref: "#/components/schemas/PaymentType" }
        note: { type: string }
        gateway: { type: [string, "null"] }
        transactionid: { type: [string, "null"] }
        updated: { type: string }
        vis_state: { $ref: "#/components/schemas/VisState" }
    PaymentType:
      type: string
      description: SDK `PaymentType` (Payment). Exact casing matters.
      enum: [Check, Credit, Cash, "Bank Transfer", "Credit Card", Debit, PayPal, "2Checkout", VISA, MASTERCARD, DISCOVER, AMEX, DINERS, JCB, ACH, Other]
    PaymentWrite:
      type: object
      required: [invoiceid, amount, date]
      properties:
        invoiceid: { type: string }
        amount: { $ref: "#/components/schemas/Money" }
        date: { type: string, format: date }
        type: { $ref: "#/components/schemas/PaymentType" }
        note: { type: string }
    PaymentRequest:
      type: object
      required: [payment]
      properties:
        payment: { $ref: "#/components/schemas/PaymentWrite" }
    PaymentResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              type: object
              properties:
                payment: { $ref: "#/components/schemas/Payment" }
    PaymentListResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              allOf:
                - $ref: "#/components/schemas/AccountingPagination"
                - type: object
                  properties:
                    payments:
                      type: array
                      items: { $ref: "#/components/schemas/Payment" }

    # ----- ITEM -----
    Item:
      type: object
      description: >-
        Item read model. NOTE: the SDK stringifies `id`, `tax1`, `tax2` in its
        model, but the wire sends them as numbers; `qty`, `unit_cost.amount` are
        strings.
      properties:
        id: { type: integer }
        accounting_systemid: { type: string }
        name: { type: string }
        description: { type: [string, "null"] }
        qty: { type: string }
        sku: { type: [string, "null"] }
        inventory: { type: [string, "null"] }
        unit_cost: { $ref: "#/components/schemas/Money" }
        tax1: { type: number }
        tax2: { type: number }
        updated: { type: string }
        vis_state: { $ref: "#/components/schemas/VisState" }
      required: [id, name, qty, unit_cost]
    ItemWrite:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        qty: { type: string }
        sku: { type: string }
        inventory: { type: string }
        unit_cost: { $ref: "#/components/schemas/Money" }
        tax1: { type: number }
        tax2: { type: number }
        vis_state: { $ref: "#/components/schemas/VisState" }
    ItemRequest:
      type: object
      required: [item]
      properties:
        item: { $ref: "#/components/schemas/ItemWrite" }
    ItemResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              type: object
              properties:
                item: { $ref: "#/components/schemas/Item" }
    ItemListResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              allOf:
                - $ref: "#/components/schemas/AccountingPagination"
                - type: object
                  properties:
                    items:
                      type: array
                      items: { $ref: "#/components/schemas/Item" }

    # ----- CREDIT NOTE -----
    CreditNote:
      type: object
      description: Credit note read model (SDK `CreditNote`). `clientid` is a string.
      properties:
        id: { type: integer }
        creditid: { type: integer }
        clientid: { type: string }
        credit_number: { type: string }
        create_date: { type: string, format: date }
        credit_type: { $ref: "#/components/schemas/CreditType" }
        currency_code: { type: string }
        amount: { $ref: "#/components/schemas/Money" }
        paid: { $ref: "#/components/schemas/Money" }
        notes: { type: string }
        terms: { type: [string, "null"] }
        language: { type: string }
        status: { $ref: "#/components/schemas/CreditNoteDisplayStatus" }
        display_status: { $ref: "#/components/schemas/CreditNoteDisplayStatus" }
        payment_status: { $ref: "#/components/schemas/CreditNotePaymentStatus" }
        dispute_status: { type: [string, "null"], enum: [disputed, resolved, "null"] }
        lines:
          type: array
          items: { $ref: "#/components/schemas/Line" }
        vis_state: { $ref: "#/components/schemas/VisState" }
    CreditType:
      type: string
      enum: [goodwill, overpayment, prepayment]
    CreditNoteDisplayStatus:
      type: string
      enum: [draft, created, sent, viewed]
    CreditNotePaymentStatus:
      type: string
      enum: [unpaid, partial, paid]
    CreditNoteWrite:
      type: object
      required: [clientid, create_date]
      properties:
        clientid: { type: string }
        create_date: { type: string, format: date }
        currency_code: { type: string }
        credit_type: { $ref: "#/components/schemas/CreditType" }
        notes: { type: string }
        terms: { type: string }
        language: { type: string }
        lines:
          type: array
          items: { $ref: "#/components/schemas/Line" }
        vis_state: { $ref: "#/components/schemas/VisState" }
    CreditNoteRequest:
      type: object
      required: [credit_notes]
      properties:
        credit_notes: { $ref: "#/components/schemas/CreditNoteWrite" }
    CreditNoteResponse:
      type: object
      description: "Both single and list responses read from the plural `credit_notes` key."
      properties:
        response:
          type: object
          properties:
            result:
              type: object
              properties:
                credit_notes: { $ref: "#/components/schemas/CreditNote" }
    CreditNoteListResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              allOf:
                - $ref: "#/components/schemas/AccountingPagination"
                - type: object
                  properties:
                    credit_notes:
                      type: array
                      items: { $ref: "#/components/schemas/CreditNote" }

    # ----- OTHER INCOME -----
    OtherIncome:
      type: object
      description: Other-income read model (SDK `OtherIncome`). `incomeid` is a string.
      properties:
        incomeid: { type: string }
        amount: { $ref: "#/components/schemas/Money" }
        category_name: { $ref: "#/components/schemas/OtherIncomeCategory" }
        date: { type: string, format: date }
        payment_type: { type: string }
        source: { type: string }
        note: { type: string }
        taxes:
          type: array
          items: { $ref: "#/components/schemas/OtherIncomeTax" }
        created_at: { type: string }
        updated_at: { type: string }
        vis_state: { $ref: "#/components/schemas/VisState" }
    OtherIncomeCategory:
      type: string
      enum: [advertising, in_person_sales, online_sales, rentals, other]
    OtherIncomeTax:
      type: object
      description: SDK `Tax` sub-object embedded in OtherIncome (distinct from the accounting Tax resource).
      properties:
        name: { type: string }
        amount: { type: number }
    OtherIncomeWrite:
      type: object
      required: [amount, payment_type]
      properties:
        amount: { $ref: "#/components/schemas/Money" }
        category_name: { $ref: "#/components/schemas/OtherIncomeCategory" }
        date: { type: string, format: date }
        payment_type: { type: string }
        source: { type: string }
        note: { type: string }
        taxes:
          type: array
          items: { $ref: "#/components/schemas/OtherIncomeTax" }
    OtherIncomeRequest:
      type: object
      required: [other_income]
      properties:
        other_income: { $ref: "#/components/schemas/OtherIncomeWrite" }
    OtherIncomeResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              type: object
              properties:
                other_income: { $ref: "#/components/schemas/OtherIncome" }
    OtherIncomeListResponse:
      type: object
      description: "List wraps the array under the singular `other_income` key."
      properties:
        response:
          type: object
          properties:
            result:
              allOf:
                - $ref: "#/components/schemas/AccountingPagination"
                - type: object
                  properties:
                    other_income:
                      type: array
                      items: { $ref: "#/components/schemas/OtherIncome" }

    # ----- JOURNAL ENTRY -----
    JournalEntryDetail:
      type: object
      description: SDK `Detail`. Request sends only `sub_accountid`, `credit`, `debit`.
      required: [sub_accountid]
      properties:
        sub_accountid: { type: integer }
        credit: { type: number }
        debit: { type: number }
        description: { type: string }
        currency_code: { type: string }
    JournalEntryWrite:
      type: object
      required: [name, user_entered_date, currency_code, details]
      properties:
        name: { type: string }
        description: { type: string }
        user_entered_date: { type: string, format: date }
        currency_code: { type: string }
        details:
          type: array
          minItems: 2
          items: { $ref: "#/components/schemas/JournalEntryDetail" }
    JournalEntryRequest:
      type: object
      required: [journal_entry]
      properties:
        journal_entry: { $ref: "#/components/schemas/JournalEntryWrite" }
    JournalEntryResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              type: object
              properties:
                journal_entry:
                  type: object
                  properties:
                    id: { type: integer }
                    entryid: { type: integer }
                    name: { type: string }
                    description: { type: string }
                    currency_code: { type: string }
                    user_entered_date: { type: string, format: date }
                    details:
                      type: array
                      items: { $ref: "#/components/schemas/JournalEntryDetail" }
    JournalEntryAccount:
      type: object
      properties:
        id: { type: integer }
        accountid: { type: integer }
        account_name: { type: string }
        account_number: { type: string }
        account_type: { type: string }
        accounting_systemid: { type: string }
        balance: { type: number }
        currency_code: { type: string }
        created_at: { type: string }
    JournalEntryAccountListResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              allOf:
                - $ref: "#/components/schemas/AccountingPagination"
                - type: object
                  properties:
                    journal_entry_accounts:
                      type: array
                      items: { $ref: "#/components/schemas/JournalEntryAccount" }

    # ----- BILL -----
    Bill:
      type: object
      description: Bill read model (SDK `Bills`). `vendorid` (no underscore) is an integer.
      properties:
        id: { type: integer }
        vendorid: { type: integer }
        bill_number: { type: string }
        status: { $ref: "#/components/schemas/BillStatus" }
        amount: { $ref: "#/components/schemas/Money" }
        paid: { $ref: "#/components/schemas/Money" }
        outstanding: { $ref: "#/components/schemas/Money" }
        tax_amount: { $ref: "#/components/schemas/Money" }
        total_amount: { $ref: "#/components/schemas/Money" }
        currency_code: { type: string }
        issue_date: { type: string, format: date }
        due_date: { type: string, format: date }
        due_offset_days: { type: integer }
        language: { type: string }
        overall_category: { type: string }
        overall_description: { type: string }
        lines:
          type: array
          items: { $ref: "#/components/schemas/BillLine" }
        created_at: { type: string }
        updated_at: { type: string }
        vis_state: { $ref: "#/components/schemas/VisState" }
    BillStatus:
      type: string
      enum: [unpaid, overdue, partial, paid]
    BillLine:
      type: object
      description: SDK `BillLines`.
      properties:
        categoryid: { type: integer }
        category: { type: string }
        description: { type: string }
        quantity: { type: number }
        unit_cost: { $ref: "#/components/schemas/Money" }
        amount: { $ref: "#/components/schemas/Money" }
        total_amount: { $ref: "#/components/schemas/Money" }
        taxName1: { type: string }
        taxName2: { type: string }
        taxPercent1: { type: number }
        taxPercent2: { type: number }
        taxAmount1: { $ref: "#/components/schemas/Money" }
        taxAmount2: { $ref: "#/components/schemas/Money" }
    BillWrite:
      type: object
      description: >-
        Writable bill fields (SDK `transformBillsRequest`). NOTE: `amount` and
        `status` are NOT sent on the request — they are computed by FreshBooks.
      required: [vendorid]
      properties:
        vendorid: { type: integer }
        bill_number: { type: string }
        currency_code: { type: string }
        issue_date: { type: string, format: date }
        due_date: { type: string, format: date }
        due_offset_days: { type: integer }
        language: { type: string }
        attachment: { type: object }
        lines:
          type: array
          items: { $ref: "#/components/schemas/BillLine" }
        vis_state: { $ref: "#/components/schemas/VisState" }
    BillRequest:
      type: object
      required: [bill]
      properties:
        bill: { $ref: "#/components/schemas/BillWrite" }
    BillResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              type: object
              properties:
                bill: { $ref: "#/components/schemas/Bill" }
    BillListResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              allOf:
                - $ref: "#/components/schemas/AccountingPagination"
                - type: object
                  properties:
                    bills:
                      type: array
                      items: { $ref: "#/components/schemas/Bill" }

    # ----- BILL PAYMENT -----
    BillPayment:
      type: object
      description: SDK `BillPayments`. `billid` (no underscore) is an integer.
      properties:
        id: { type: integer }
        billid: { type: integer }
        amount: { $ref: "#/components/schemas/Money" }
        paid_date: { type: string, format: date }
        payment_type: { $ref: "#/components/schemas/PaymentType" }
        note: { type: string }
        vis_state: { $ref: "#/components/schemas/VisState" }
    BillPaymentWrite:
      type: object
      required: [billid, amount]
      properties:
        billid: { type: integer }
        amount: { $ref: "#/components/schemas/Money" }
        paid_date: { type: string, format: date }
        payment_type: { $ref: "#/components/schemas/PaymentType" }
        note: { type: string }
        vis_state: { $ref: "#/components/schemas/VisState" }
    BillPaymentRequest:
      type: object
      required: [bill_payment]
      properties:
        bill_payment: { $ref: "#/components/schemas/BillPaymentWrite" }
    BillPaymentResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              type: object
              properties:
                bill_payment: { $ref: "#/components/schemas/BillPayment" }
    BillPaymentListResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              allOf:
                - $ref: "#/components/schemas/AccountingPagination"
                - type: object
                  properties:
                    bill_payments:
                      type: array
                      items: { $ref: "#/components/schemas/BillPayment" }

    # ----- BILL VENDOR -----
    BillVendor:
      type: object
      description: SDK `BillVendors`. Uses `primary_contact_*` / `vendor_name` fields.
      properties:
        vendorid: { type: integer }
        vendor_name: { type: string }
        primary_contact_first_name: { type: string }
        primary_contact_last_name: { type: string }
        primary_contact_email: { type: string }
        account_number: { type: string }
        phone: { type: string }
        street: { type: string }
        street2: { type: string }
        city: { type: string }
        province: { type: string }
        country: { type: string }
        postal_code: { type: string }
        currency_code: { type: string }
        language: { type: string }
        note: { type: string }
        website: { type: string }
        is1099: { type: boolean }
        outstanding_balance:
          type: array
          items: { $ref: "#/components/schemas/Money" }
        overdue_balance:
          type: array
          items: { $ref: "#/components/schemas/Money" }
        tax_defaults:
          type: array
          items: { $ref: "#/components/schemas/BillVendorTax" }
        created_at: { type: string }
        updated_at: { type: string }
        vis_state: { $ref: "#/components/schemas/VisState" }
    BillVendorTax:
      type: object
      properties:
        taxid: { type: integer }
        name: { type: string }
        amount: { type: string }
        enabled: { type: boolean }
    BillVendorWrite:
      type: object
      properties:
        vendor_name: { type: string }
        primary_contact_first_name: { type: string }
        primary_contact_last_name: { type: string }
        primary_contact_email: { type: string }
        account_number: { type: string }
        phone: { type: string }
        street: { type: string }
        street2: { type: string }
        city: { type: string }
        province: { type: string }
        country: { type: string }
        postal_code: { type: string }
        currency_code: { type: string }
        language: { type: string }
        note: { type: string }
        website: { type: string }
        is1099: { type: boolean }
        vis_state: { $ref: "#/components/schemas/VisState" }
    BillVendorRequest:
      type: object
      required: [bill_vendor]
      properties:
        bill_vendor: { $ref: "#/components/schemas/BillVendorWrite" }
    BillVendorResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              type: object
              properties:
                bill_vendor: { $ref: "#/components/schemas/BillVendor" }
    BillVendorListResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              allOf:
                - $ref: "#/components/schemas/AccountingPagination"
                - type: object
                  properties:
                    bill_vendors:
                      type: array
                      items: { $ref: "#/components/schemas/BillVendor" }

    # ----- TASK -----
    Task:
      type: object
      description: SDK `Tasks`. Uses `tname`/`tdesc` aliases and a Money `rate`.
      properties:
        id: { type: integer }
        taskid: { type: integer }
        name: { type: [string, "null"] }
        description: { type: [string, "null"] }
        tname: { type: [string, "null"] }
        tdesc: { type: [string, "null"] }
        billable: { type: boolean }
        rate: { $ref: "#/components/schemas/Money" }
        updated: { type: string }
        vis_state: { $ref: "#/components/schemas/VisState" }
    TaskWrite:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        tname: { type: string }
        tdesc: { type: string }
        billable: { type: boolean }
        rate: { $ref: "#/components/schemas/Money" }
        vis_state: { $ref: "#/components/schemas/VisState" }
    TaskRequest:
      type: object
      required: [task]
      properties:
        task: { $ref: "#/components/schemas/TaskWrite" }
    TaskResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              type: object
              properties:
                task: { $ref: "#/components/schemas/Task" }
    TaskListResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            result:
              allOf:
                - $ref: "#/components/schemas/AccountingPagination"
                - type: object
                  properties:
                    tasks:
                      type: array
                      items: { $ref: "#/components/schemas/Task" }

    # ----- PROJECT (Projects API) -----
    Project:
      type: object
      description: >-
        Project read model (SDK `Project`). `clientid` is a string here; money-ish
        fields (`budget`, `fixed_price`, `rate`) are decimal **strings**, not Money.
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: [string, "null"] }
        due_date: { type: [string, "null"], format: date }
        client_id: { type: [string, "null"] }
        internal: { type: boolean }
        active: { type: boolean }
        complete: { type: boolean }
        sample: { type: boolean }
        budget: { type: [string, "null"] }
        fixed_price: { type: [string, "null"] }
        rate: { type: [string, "null"] }
        billing_method: { $ref: "#/components/schemas/BillingMethod" }
        project_type: { $ref: "#/components/schemas/ProjectType" }
        billed_status: { $ref: "#/components/schemas/BilledStatus" }
        project_manager_id: { type: [string, "null"] }
        logged_duration: { type: [integer, "null"] }
        billed_amount: { type: number }
        expense_markup: { type: number }
        retainer_id: { type: [string, "null"] }
        group_id: { type: [string, "null"] }
        services:
          type: array
          items: { $ref: "#/components/schemas/Service" }
        created_at: { type: string, description: "YYYY-MM-DDThh:mm:ss" }
        updated_at: { type: string }
    ProjectType:
      type: string
      enum: [fixed_price, hourly_rate]
    BillingMethod:
      type: [string, "null"]
      enum: [business_rate, project_rate, service_rate, team_member_rate, "null"]
    BilledStatus:
      type: string
      enum: [billed, partially_billed, unbilled]
    ProjectWrite:
      type: object
      required: [title]
      properties:
        title: { type: string }
        description: { type: string }
        due_date: { type: string, format: date }
        client_id: { type: string }
        internal: { type: boolean }
        active: { type: boolean }
        complete: { type: boolean }
        sample: { type: boolean }
        budget: { type: string }
        fixed_price: { type: string }
        rate: { type: string }
        billing_method: { $ref: "#/components/schemas/BillingMethod" }
        project_type: { $ref: "#/components/schemas/ProjectType" }
        project_manager_id: { type: string }
    ProjectRequest:
      type: object
      required: [project]
      properties:
        project: { $ref: "#/components/schemas/ProjectWrite" }
    ProjectResponse:
      type: object
      description: "Top-level `{ project: {...} }` (NOT response.result)."
      properties:
        project: { $ref: "#/components/schemas/Project" }
    ProjectListResponse:
      type: object
      description: "Top-level `{ projects: [...], meta: {...} }`."
      properties:
        projects:
          type: array
          items: { $ref: "#/components/schemas/Project" }
        meta: { $ref: "#/components/schemas/ProjectMeta" }

    # ----- SERVICE (Comments API) -----
    Service:
      type: object
      description: SDK `Service`. Uses `business_id`; envelope is top-level.
      properties:
        id: { type: integer }
        business_id: { type: integer }
        name: { type: string }
        billable: { type: boolean }
        vis_state: { $ref: "#/components/schemas/VisState" }
    ServiceWrite:
      type: object
      required: [name]
      description: "Create sends only `name` (billable is not transmitted)."
      properties:
        name: { type: string }
    ServiceRequest:
      type: object
      required: [service]
      properties:
        service: { $ref: "#/components/schemas/ServiceWrite" }
    ServiceResponse:
      type: object
      description: "Top-level `{ service: {...} }`."
      properties:
        service: { $ref: "#/components/schemas/Service" }
    ServiceListResponse:
      type: object
      description: "Top-level `{ services: [...], meta: {...} }`."
      properties:
        services:
          type: array
          items: { $ref: "#/components/schemas/Service" }
        meta: { $ref: "#/components/schemas/ProjectMeta" }

    # ----- SERVICE RATE -----
    ServiceRate:
      type: object
      description: SDK `ServiceRate`. Only `rate` (decimal string); no currency code.
      properties:
        rate: { type: string }
        business_id: { type: integer }
        service_id: { type: integer }
    ServiceRateWrite:
      type: object
      required: [rate]
      properties:
        rate: { type: string }
    ServiceRateRequest:
      type: object
      required: [service_rate]
      properties:
        service_rate: { $ref: "#/components/schemas/ServiceRateWrite" }
    ServiceRateResponse:
      type: object
      description: "Top-level `{ service_rate: {...} }`."
      properties:
        service_rate: { $ref: "#/components/schemas/ServiceRate" }

    # ----- TIME ENTRY (Time-tracking API) -----
    TimeEntry:
      type: object
      description: >-
        SDK `TimeEntry`. Envelope is top-level. `started_at`/`created_at` are
        full ISO-8601 date-times; `duration` is in **seconds**.
      properties:
        id: { type: integer }
        identity_id: { type: integer }
        is_logged: { type: boolean }
        duration: { type: integer, description: seconds }
        started_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        client_id: { type: integer }
        project_id: { type: integer }
        task_id: { type: [integer, "null"] }
