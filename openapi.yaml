  /payments/account/{accountId}/payment_options:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      tags: [payment_options]
      operationId: getDefaultPaymentOptions
      summary: Get the account default payment options
      description: >-
        The SDK `paymentOptions.default(accountId)` is a **GET** with a fixed
        `entity_type=invoice` query — it retrieves the default options, it does
        not set them.
      parameters:
        - name: entity_type
          in: query
          required: true
          schema:
            type: string
            enum: [invoice]
      responses:
        "200":
          description: The default payment options
          content:
